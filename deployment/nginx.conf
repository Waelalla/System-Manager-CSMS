# Nginx Virtual Host — CSMS
# Copy to: /etc/nginx/sites-available/csms
# Enable:  ln -s /etc/nginx/sites-available/csms /etc/nginx/sites-enabled/csms
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# Replace "csms.yourdomain.com" with your actual domain throughout this file.
#
# This config works as-is (HTTP only) before SSL is set up.
# After deployment, run certbot to add HTTPS automatically:
#   certbot --nginx -d csms.yourdomain.com
#
# Frontend static files are served directly by Nginx from the built dist folder.
# API requests (/api/*) are proxied to the Node.js backend on port 8080.

upstream csms_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name csms.yourdomain.com;

    # --- Static file root (React SPA build output) ---
    root /var/www/csms/artifacts/csms/dist/public;
    index index.html;

    # --- Gzip compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # --- Security headers ---
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # --- File upload size (match multer limits in API) ---
    client_max_body_size 20M;

    # --- API proxy ---
    # All /api/* requests are forwarded to the Express backend.
    location /api/ {
        proxy_pass         http://csms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (required if API uses ws:// upgrades in the future)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # --- Uploaded files (served directly by Nginx) ---
    location /api/uploads/ {
        alias   /var/www/csms/artifacts/api-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Static assets — long-lived cache ---
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Frontend SPA — serve index.html for all non-file routes ---
    # This enables client-side routing (React Router / Wouter).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Certbot ACME challenge (used by Let's Encrypt SSL setup) ---
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# After running "certbot --nginx -d csms.yourdomain.com", certbot will
# automatically add the HTTPS server block and redirect HTTP → HTTPS above.
