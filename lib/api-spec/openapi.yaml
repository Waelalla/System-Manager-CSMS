      responses:
        "200":
          description: Branches list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchesListResponse"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create a branch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "201":
          description: Branch created
          content:
