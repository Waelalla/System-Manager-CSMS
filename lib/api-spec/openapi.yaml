      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: search
          in: query
          schema:
            type: string
        - name: branch_id
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: governorate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomersListResponse"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      security:
