# Nginx Virtual Host — CSMS
# Copy to: /etc/nginx/sites-available/csms
# Enable:  ln -s /etc/nginx/sites-available/csms /etc/nginx/sites-enabled/csms
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# Replace "csms.yourdomain.com" with your actual domain.
# After enabling, run certbot to add HTTPS:
#   certbot --nginx -d csms.yourdomain.com

upstream csms_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream csms_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name csms.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name csms.yourdomain.com;

    # --- SSL (certbot will fill these in automatically) ---
    # ssl_certificate     /etc/letsencrypt/live/csms.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/csms.yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # --- Gzip compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # --- File upload size (must match multer limits in API) ---
    client_max_body_size 20M;

    # --- API proxy ---
    location /api/ {
        proxy_pass         http://csms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # --- Static file uploads (served directly by Nginx for performance) ---
    location /api/uploads/ {
        alias /var/www/csms/artifacts/api-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Frontend SPA ---
    location / {
        proxy_pass         http://csms_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Cache static assets from the frontend build
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            proxy_pass http://csms_web;
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
