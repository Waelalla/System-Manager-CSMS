packages:
  "recharts": "For analytics charts and dashboard KPIs"
  "framer-motion": "For page transitions and micro-interactions"
  "date-fns": "For formatting dates and times"
  "lucide-react": "For beautiful icons"
  "@hookform/resolvers": "Zod validation for forms"
  "react-hook-form": "For form state management"
  "zod": "Schema validation"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility to merge tailwind classes"

images:
  - path: "artifacts/csms/public/images/auth-bg.png"
    description: "Abstract dark professional background with subtle glowing purple and blue gradient meshes, enterprise tech feel"
    aspect_ratio: "16:9"
  - path: "artifacts/csms/public/images/logo.png"
    description: "Modern minimalist logo mark for a customer service system, geometric shape in electric blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - Auth token is stored in localStorage as 'access_token'
  - Global fetch interceptor injected in App.tsx to append Bearer token to all /api calls
  - Arabic (RTL) is the default language, handled via context and document.documentElement.dir
